name: Deploy to EKS with Helm [Uat]

on:
  push:
    branches:
      - release/*
  workflow_dispatch:

jobs:
  uat-deploy:
    name: Deploy Helm Chart to EKS preprod
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: uat
      APPNAME: directory-service
      DOCKER_IMAGE: directory-service
      ECR_REPOSITORY: pln-directory-service
      GITHUB_SHA: ${{ github.sha }}
      CLUSTER_NAME: preprod-pln
      APP_MODE: directory_service

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::013228333448:role/github-actions-pln-uat
          aws-region: us-west-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image metadata
        run: |
          git_hash=$(git rev-parse --short "$GITHUB_SHA")
          ECR_REGISTRY=$(aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --query 'repositories[0].repositoryUri' \
            --output text)

          echo "IMAGE_TAG=$git_hash" >> "$GITHUB_ENV"
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}:uat
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: 'memser-spaceport/pl-infra-pipeline'
          ref: 'prod_release_v2'
          token: ${{ secrets.GIT_TOKEN }}
          path: './'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Update kubeconfig for EKS
        run: |
          aws sts get-caller-identity
          aws eks update-kubeconfig \
            --region us-west-1 \
            --name ${{ env.CLUSTER_NAME }}

      - name: Verify Kubernetes access
        run: |
          kubectl config current-context
          kubectl get pods -n pln-uat

      - name: poetry install for comprehend modules
        run: |
          poetry install --no-root
        working-directory: ./deployment/config_gen

      - name: Config generator
        run: |
          poetry run python main.py APPNAME=${{ env.APPNAME }} ENVIRONMENT=${{ env.ENVIRONMENT }} APP_MODE=${{ env.APP_MODE }}
        working-directory: ./deployment/config_gen

      - name: Get Certificate ARN from SSM Parameter Store
        id: get-secret
        run: |
          CERT_ARN=$(aws ssm get-parameter \
            --region us-west-1 \
            --name "/pln/acm/config" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text)
          echo "CERT_ARN=$CERT_ARN" >> "$GITHUB_ENV"

      - name: Deploy using Helm
        run: |
          helm upgrade --install directory-service deployment/chart/ \
            --set image.repository=${{ env.ECR_REGISTRY }} \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --set nodeSelector.allocationtags=pln-uat-k8s \
            --set ingress.grpname=uat-pln-internal \
            --set ingress.healthcheck_path=/ \
            --set ingress.host=api-uat-directory.plnetwork.io \
            --set service.port=3000 \
            --set ingress.acm_arn=$CERT_ARN \
            --set serviceAccount.create=true \
            --set serviceAccount.name=directory-service-sa \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=arn:aws:iam::013228333448:role/directory-service-uat-irsa \
            -f deployment/chart/${{ env.APP_MODE }}_secret_values.yaml \
            -n pln-uat
